name: Create post from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: create-post
  cancel-in-progress: false

jobs:
  create-post:
    runs-on: ubuntu-latest
    if: >
      contains(github.event.issue.labels.*.name, 'new-post') ||
      startsWith(github.event.issue.title, '[Post]')
    env:
      TZ: America/Argentina/Buenos_Aires
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BLOG }}

      - name: Create post file from issue
        id: create
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GITHUB_TOKEN: ${{ secrets.BLOG }}
        run: node scripts/create-post-from-issue.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.create.outputs.file }}" ${{ steps.create.outputs.attachments }}
          git commit -m "feat: new post ${{ steps.create.outputs.file }} (#${{ github.event.issue.number }})"
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push rejected, syncing with remote (attempt $attempt)..."
            git pull --rebase origin main
          done
          echo "Failed to push after several attempts" >&2
          exit 1

      - name: Comment and close issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          POST_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/blog/${{ steps.create.outputs.slug }}"
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Post published: $POST_URL (live once the Pages deploy finishes)."
          gh issue close "${{ github.event.issue.number }}"

      - name: Report failure on the issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Could not create the post. Check the workflow run logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
